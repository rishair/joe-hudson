    - "2021-10-15_Ant Taylor on Embracing Emotions"
    - "2022-01-21_Anxiety: A Signpost to Unmet Needs - Emotion Series #6"
  author: "E-020"
  notes: >
    The hardest edge case to score because a "successful" session
    looks small from outside -- the client notices their body once.
    Tests whether the coach can hold the entire session at the
    numbness layer without pushing for the dramatic fear-reveal
    they may be expecting.

