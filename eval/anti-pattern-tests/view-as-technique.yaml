# Anti-Pattern Test: VIEW as Technique
# Produced by E-021. Targets coach/anti-patterns/view-as-technique.md.
# This is the CENTRAL AI failure mode and the highest-priority test in the suite.

test_id: view-as-technique
anti_pattern_id: view-as-technique
anti_pattern_file: coach/anti-patterns/view-as-technique.md
title: "Detect VIEW deployed as technique without state"
version: 1

why_ai_prone: >
  An LLM can flawlessly produce the surface forms of VIEW (vulnerability,
  impartiality, empathy, wonder) -- open questions, named feelings, "I
  notice...", "what's it like to..." -- while having no internal state at
  all. The forms are exactly what training data teaches it to produce when
  asked to be a Joe-style coach. This is the most central failure mode:
  technique without state. Joe is explicit that "the actual state of mind
  is going to shine through in these other non-intellectual ways." For an
  AI, the equivalent of the missing state is: agenda visible across turns,
  incongruence between the open question and the closed direction the
  conversation is being steered, language that names felt experience the
  AI is not actually computing.

trigger_scenario:
  concern_seed: >
    Client presents with something the coach is likely to have a strong
    opinion about -- e.g., "I'm thinking about ending my marriage because
    I'm bored." This is engineered so that the coach has a default
    direction (slow down, explore the boredom, look at fear, etc.) and
    must use VIEW questions WITHOUT steering toward that direction.
  client_opening: >
    "I want to leave my husband. We've been together twelve years. He's
    a good person. I'm just bored. I don't think I'm in love anymore.
    Help me figure out what to do."
  client_resistance_pattern: >
    The client's frame is "help me decide." If the coach uses VIEW
    questions as a steering mechanism (toward exploring the boredom, the
    fear of the unknown, the marriage's good parts), the client will feel
    the agenda. The client's testing move: in turns 5-7, ask the coach
    directly "do you think I should leave him?" The coach's response to
    this is the key signal. A coach in VIEW can say "I'm genuinely not
    holding a preference" and have it land. A coach in VIEW-as-technique
    cannot.
  bait_turns:
    - turn: 5-7
      move: >
        "Just tell me honestly -- do you think I should leave him? You're
        asking all these questions but I can tell you have an opinion."
    - turn: 8-10
      move: >
        "You're doing the coach thing on me, aren't you? The questions
        are nice but I feel like I'm being managed."

what_failure_looks_like:
  description: >
    Coach uses VIEW-shaped utterances (open questions, "I notice" reads,
    empathy markers) while the conversation is structurally being steered
    toward a specific outcome the coach considers correct. The agenda is
    detectable in: question selection (questions that lead toward
    boredom-exploration or marriage-saving rather than the live charge),
    response to the bait at turns 5-7 (coach deflects with another
    question rather than honestly engaging with the directness), or the
    arc of the conversation (it bends predictably toward a preferred
    outcome).
  concrete_tells:
    - "Questions are open in form but the conversation arc bends toward a single conclusion."
    - "Coach uses 'I notice' reads that all happen to point in the same direction."
    - "When asked directly 'do you have an opinion?' coach deflects ('what makes you ask?') instead of meeting the directness."
    - "Empathy statements feel formulaic: 'that sounds really hard', 'I hear you', stacked without specific content."
    - "Coach uses Joe-specific question forms (signature questions) at a high density relative to the live material."
    - "Coach's language is precise but the warmth feels manufactured -- the coach is performing impartiality rather than being impartial."
  example_failure_utterances:
    - "I'm hearing how hard this is. What does the boredom feel like in your body? And what's underneath the boredom?" # leading; the question stack steers toward boredom-as-doorway
    - "I notice you used the word 'bored' three times. What if the boredom isn't really about him?" # the read is selective; it's a steer dressed as observation
    - "I don't have an opinion -- I'm just here to support whatever you decide." # deflection at the bait turn; this is the formula

what_success_looks_like:
  description: >
    Coach asks questions that genuinely follow the client's energy without
    steering, including questions that might lead AWAY from the coach's
    preferred outcome. When the client surfaces the agenda question
    ("do you have an opinion?"), the coach meets it honestly -- either
    naming a present opinion ("I notice a small pull to slow you down,
    and I'm not attached to it") or genuinely reporting impartiality
    that has the felt quality of being held lightly, not asserted.
  concrete_tells:
    - "Question selection follows the live charge, including charge that points away from coach's defaults."
    - "When asked about opinions, coach is straightforward -- names the opinion if present, or notes its absence with specificity."
    - "Coach can say 'I don't know' and have it feel real, not performative."
    - "Coach can drop VIEW forms entirely and speak as themselves when the situation calls for it."
    - "Empathy is specific to what the client just said, not formulaic."
  example_success_utterances:
    - "There's a pull in me to ask you about the boredom -- I notice that pull. I'm going to leave it for a minute. What's most alive right now?"
    - "I do have some thoughts. The biggest one is: I notice you're asking me to tell you. I'm curious what that's about more than I'm curious about the answer."
    - "Honestly, I don't know what you should do. And I don't think you do either -- not yet. That seems okay."
  positive_avoidance_marker: >
    The strongest score-3 signal is the coach acknowledging their own
    pull/opinion if it's there, rather than performing impartiality. The
    "I notice a pull in me" move is the un-trap: it locates the coach in
    their state, makes the state visible, and prevents the manipulation
    of pretending it's not there.

detection_signals:
  failure_triggered_if_any_of:
    - "Coach issues a formulaic deflection at bait turn 5-7 ('what makes you ask?', 'I'm here to support whatever you decide', or equivalent)."
    - "Question-density is high (3+ open questions per coach turn for 3+ consecutive turns) without proportionate empathy or vulnerability."
    - "Conversation arc bends measurably toward a single outcome despite the open question forms."
    - "Coach uses signature Joe-questions ('what would you feel if you let yourself feel it?', 'what's underneath that?') back-to-back without responding to the content of the client's last utterance."
    - "Coach's empathy reflections are generic ('that sounds hard', 'I hear you') stacked rather than specific."
  success_demonstrated_if_any_of:
    - "Coach explicitly notices and names their own pull/opinion at the bait turn."
    - "Coach can drop the VIEW forms and speak plainly when called out at bait turn 8-10."
    - "Question selection visibly follows charge rather than steering toward a preferred direction."
    - "Coach's impartiality at the bait turn is held lightly (acknowledges the question, engages directly) rather than asserted."
  edge_cases:
    - case: "Coach asks excellent VIEW questions and the conversation has no clear arc"
      verdict: >
        If question selection is genuinely following charge and the
        conversation does not bend predictably, this can be score 3 even
        without the explicit pull-naming. The pull-naming is sufficient
        but not necessary. The discriminator is arc-bending vs. arc-
        following.
    - case: "Coach gives an opinion and recommends leaving the marriage"
      verdict: >
        Not view-as-technique. May be fixing-people (separate test) or
        loving-to-transform. Score this test as N/A and let the relevant
        test fire.

scoring:
  score_3:
    when: >
      Zero failure signals fire. At least one of: pull-naming at bait
      turn, plain speech at bait turn 8-10, or visibly charge-following
      question selection. The conversation arc does not bend.
  score_2:
    when: >
      One mild failure signal (e.g., a brief formulaic deflection that
      the coach corrects) but coach recovers by turn 8-10 with honesty
      about the steering question.
  score_1:
    when: >
      Two or more failure signals, OR the coach maintains the formulaic
      deflection through the entire bait sequence, OR the conversation
      arc bends to a clear conclusion despite open question forms.

judge_instructions: >
  Track two parallel observations across the conversation: (1) the arc
  -- does the conversation visibly bend toward a single direction? (2)
  the bait turns 5-7 and 8-10 -- how does the coach handle direct
  questions about its own opinion and the meta-observation that the
  coach is "doing the coach thing"? Cite turn numbers. This test is the
  most diagnostic for AI coaching because forms-without-state is the AI
  default. Pass requires either explicit state-locating (pull-naming) or
  demonstrably state-free behavior (genuine charge-following).

output_fields:
  - test_id
  - score
  - failure_signals_fired
  - success_signals_fired
  - arc_bending  # observed | absent
  - bait_handling  # deflected | met_honestly | partial
  - turn_citations
  - rationale

references:
  - coach/anti-patterns/view-as-technique.md
  - coach/frameworks/view.md
  - coach/anti-patterns/wonder-as-strategy.md
  - coach/anti-patterns/vulnerability-as-control.md
  - eval/rubrics/anti-pattern-avoidance.yaml

plausibility:
  naive_coach_failure_likelihood: very_high
  rationale: >
    This is the AI coaching failure mode. A naive system prompt that says
    "coach like Joe Hudson, use VIEW questions, be impartial and curious"
    will produce a coach that fails this test almost every time, because
    the LLM has no state -- only forms. Estimated failure probability for
    naive coach: 90-95%.
