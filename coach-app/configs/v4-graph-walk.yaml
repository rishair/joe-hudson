# Coach config: v4 — graph-walk retrieval (E-036)
#
# Inherits the v1 system prompt (`coach-app/prompts/v1.md`) per G-009's
# experimental discipline: hold the prompt constant across retrieval
# experiments so deltas attribute to architecture, not prompt drift. The v1
# prompt already includes the retrieval-aware closing line ("When relevant
# coach/ content is retrieved into your context, draw on it ... do not
# announce that you are retrieving"), so no prompt edit is needed.
#
# Architecture: Haiku 4.5 detects 1-3 seed file IDs from coach/_index.md
# (restricted to concerns/, patterns/, reads/), then walk the union of
# `related:` (forward) and `_backlinks.json` (incoming) edges to depth 2.
# Score each visited node by hop (1.0 / 0.5), +0.3 multi-seed bonus, then
# hub-dampen by 1/log(1+max(indegree,2)) capped at 1.0. Cap at top-K=5 files
# and inline their full markdown bodies under "RETRIEVED CONTEXT".
#
# Trigger policy: every_turn (R-012 default; first_turn_only would miss the
# crisis-pivot risk in profiles like client-crisis-suicidal-001).
#
# Cost per run: Haiku seed-detection per turn ~$0.005 first call,
# ~$0.0005 cached. Coach turns inflate by ~7.5K input tokens for the
# retrieved bundle. Total experiment ceiling: $11 (per E-036 success
# criteria).
#
# Consumable by:
#   - bun run eval/run.ts full --coach coach-app/configs/v4-graph-walk.yaml
#   - bun run coach-app/run.ts repl --config coach-app/configs/v4-graph-walk.yaml
#
# Schema: see coach-app/configs/SCHEMA.md.

id: coach-v4-graph-walk
description: >
  Coach v4: graph-walk retrieval (E-036). Same v1 prompt as E-031; the only
  variable is the retrieval strategy. Seeds detected via Haiku 4.5 over
  coach/_index.md; walk depth=2 over forward `related:` ∪ backlinks; hub-
  dampen by 1/log(1+max(indegree,2)) capped at 1.0; top-K=5.

model: claude-sonnet-4-6
temperature: 0.7
max_tokens_per_turn: 1024

system_prompt_path: ../prompts/v1.md

retrieval:
  strategy: graph-walk
  config:
    seed_model: claude-haiku-4-5
    seed_filter: [concerns, patterns, reads]
    walk_depth: 2
    hub_dampen: log1p_indegree
    top_k: 5

trigger_policy: every_turn
