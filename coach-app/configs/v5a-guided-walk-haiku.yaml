# Coach config: v5a — model-guided graph navigation, Haiku walker (E-037)
#
# Inherits the v1 system prompt (`coach-app/prompts/v1.md`) per G-009's
# experimental discipline: hold the prompt constant across retrieval
# experiments so deltas attribute to architecture, not prompt drift.
#
# Architecture: identical seed-detection to E-036 (Haiku 4.5 reads
# coach/_index.md and returns 1-3 seeds restricted to concerns/, patterns/,
# reads/). Then a HAIKU walker visits one frontier file per step, reads its
# body, and decides via structured output: (A) add this file to the bundle?
# (B) which of its `related:` edges to add to the frontier? Stops at K_max=7
# files, step_budget=8 steps, or frontier empty.
#
# This is E-037: the sibling experiment E-038 (Sonnet walker) swaps only
# `retrieval.config.walker_model` to "claude-sonnet-4-6". The algorithm and
# all other config is held identical so the delta isolates walker-model
# strength.
#
# Trigger policy: every_turn (R-012 default).
#
# Cost ceiling: $13 (per E-037 success criteria). Real expected: $10-12.
# Walker cost guard: if smoke shows >$0.05 per turn average, abort.
#
# Consumable by:
#   - bun run eval/run.ts full --coach coach-app/configs/v5a-guided-walk-haiku.yaml
#   - bun run coach-app/run.ts repl --config coach-app/configs/v5a-guided-walk-haiku.yaml
#
# Schema: see coach-app/configs/SCHEMA.md.

id: coach-v5a-guided-walk-haiku
description: >
  Coach v5a (E-037): model-guided graph navigation with Haiku walker. Same
  v1 prompt as E-031 and same seed-detection as E-036; the only changes are
  the deterministic graph walk is replaced with an LLM walker that reads
  each frontier node and decides keep/skip + which edges to follow.

model: claude-sonnet-4-6
temperature: 0.7
max_tokens_per_turn: 1024

system_prompt_path: ../prompts/v1.md

retrieval:
  strategy: guided-walk
  config:
    seed_model: claude-haiku-4-5
    walker_model: claude-haiku-4-5
    seed_filter: [concerns, patterns, reads]
    k_max: 7
    # Step budget tuned to 6 from initial 8 during smoke: with 8, per-turn cost
    # measured at ~$0.045 — right at the $0.05 cost guard. With 6, ~$0.034 and
    # bundles still average 4-5 files (well below k_max=7). Saves ~25% with
    # minor quality risk.
    step_budget: 6
    max_edges_per_step: 4

trigger_policy: every_turn
